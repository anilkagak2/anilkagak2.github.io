    Experience:
      - company: Snap Research
        position: Senior Research Scientist (L5) | Team Lead, Efficient GenAI
        location: Santa Monica, CA
        start_date: 2025-04-01
        end_date: Present
        summary: Lead Efficient Generative AI Team, directing the technical strategy for Snap's hardware-agnostic generative stack.
        highlights:
          - "Elastic Supernetworks: Spearheading the development of SnapGen++, a pioneering Elastic Diffusion Transformer (DiT) framework."
          - "Efficiency Frontiers: Architecting the next generation of SnapVideo models, achieving superior generation quality at significantly lower inference compute."
          - "Mobile Video Pioneers: Directing the team in the design of high-performance DiT models capable of real-time streaming video generation on-device."
          - "Strategic Mentorship: Leading a team of research scientists to bridge the gap between foundational research and production-scale AI deployment."

      - company: Snap Research
        position: Research Scientist (L4)
        location: Santa Monica, CA
        start_date: 2023-07-01
        end_date: 2025-03-31
        summary: Developed foundational generative architectures that transitioned from academic highlights to core Snapchat product features.
        highlights:
          - "SnapGen (Patent-Pending): Authored the landmark SnapGen paper (CVPR 2024 Highlight); orchestrated the architecture for which Snap Inc. filed a United States Patent."
          - "Large-Scale Product Impact: Engineered SnapVideo v2, powering numerous AI Lenses used by hundreds of millions of Snapchat users daily."
          - "Scholarly Leadership: Mentored over 10 Research Interns, resulting in prolific output at top-tier conferences (CVPR, NeurIPS)."

